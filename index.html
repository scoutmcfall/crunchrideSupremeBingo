<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crunchride Supreme Bingo</title>
  <style>
    body, html {
    height: 100%;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
    box-sizing: border-box;
    }
    * {
        box-sizing: inherit;
    }
    
    body {
      font-family: 'Roboto', Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 10px 5px; /* left/right padding so the grid doesn't touch screen edges */
      background: #c267b0;
    }

    h1 {
    text-align: center;
    font-family: 'Roboto', Arial, sans-serif;
    font-weight: 700;
    margin: 10px 0 15px;
    }

    #controls {
      margin-bottom: 10px;
    }

    button {
    padding: 12px 16px;
    margin: 6px;
    font-size: 16px;
    border-radius: 8px;
      border: none;
      background: #48b693;
      color: white;
    }

    #board {
    display: grid;
    gap: 6px; /* slightly smaller for mobile */
    width: 100%;
    max-width: 100vw; /* limit to viewport width */
    margin: 0 auto;
    box-sizing: border-box;
    grid-template-columns: repeat(4, minmax(0, 1fr)); /* prevents overflow */
    }

    .cell {
    background: white;
    border-radius: 12px;
    padding: 4px; /* smaller on mobile */
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: clamp(12px, 2.5vw, 16px); /* scales with screen width */
    cursor: pointer;
    border: 2px solid #ddd;
    user-select: none;
    }

    .marked {
      background: #599da4;
      color: white;
      border-color: #1e7e34;
    }
  </style>
</head>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<body>

<h1>🚴 Crunchride Supreme Bingo</h1>

<div id="controls">
  <button onclick="newGame(4)">New Game</button>
  <button onclick="resetMarks()">Reset</button>
</div>

<div id="board"></div>

<script>
const TASKS = [
  "Chihuahua sighting",
  "Eat a stack of 4 mexican pizzas like a sandwich",
  "Get baja blasted",
  "Take a shot of straight diablo sauce",
  "Eat a taco lady and the tramp style",
  "Go through the drive thru to order",
  "Drink a mixture of all the sodas",
  "Eat a potato taco in 2 bites",
  "Order something fresca style",
  "Eat beans",
  "Eat something from breakfast menu",
  "Drink water",
  "Eat 5 crunchwraps",
  "Lizard sighting",
  "Snake sighting",
  "Take a shot of a lesser sauce"
];

let currentSize = 4;
let boardData = [];

function checkBingo() {
  const size = currentSize;

  // Convert to 2D grid
  const grid = [];
  for (let i = 0; i < size; i++) {
    grid.push(boardData.slice(i * size, (i + 1) * size));
  }

  // Check rows
  for (let row of grid) {
    if (row.every(cell => cell.marked)) return true;
  }

  // Check columns
  for (let col = 0; col < size; col++) {
    let win = true;
    for (let row = 0; row < size; row++) {
      if (!grid[row][col].marked) {
        win = false;
        break;
      }
    }
    if (win) return true;
  }

  // Check diagonals
  let diag1 = true;
  let diag2 = true;

  for (let i = 0; i < size; i++) {
    if (!grid[i][i].marked) diag1 = false;
    if (!grid[i][size - i - 1].marked) diag2 = false;
  }

  return diag1 || diag2;
}
let hasWon = false;

function celebrateWin() {
  if (hasWon) return;
  hasWon = true;

  alert("🎉 BINGO! 🎉");

  confetti({
    particleCount: 150,
    spread: 70,
    origin: { y: 0.6 }
  });
}

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function newGame(size) {
  currentSize = size;
  const total = size * size;

  const shuffled = shuffle([...TASKS]);
  boardData = shuffled.slice(0, total).map(task => ({
    text: task,
    marked: false
  }));

  saveState();
  render();
}

function render() {
  const board = document.getElementById("board");
  board.style.gridTemplateColumns = `repeat(${currentSize}, 1fr)`;
  board.innerHTML = "";

  boardData.forEach((cell, index) => {
    const div = document.createElement("div");
    div.className = "cell" + (cell.marked ? " marked" : "");
    div.innerText = cell.text;

    div.onclick = () => {
    boardData[index].marked = !boardData[index].marked;
    saveState();

    if (checkBingo()) {
        celebrateWin();
    }

    render();
    };

    board.appendChild(div);
  });
}

function resetMarks() {
  boardData.forEach(cell => cell.marked = false);
  saveState();
  render();
}

function saveState() {
  localStorage.setItem("bingoState", JSON.stringify({
    size: currentSize,
    data: boardData
  }));
}

function loadState() {
  const saved = localStorage.getItem("bingoState");
  if (saved) {
    const parsed = JSON.parse(saved);
    currentSize = parsed.size;
    boardData = parsed.data;
    render();
  } else {
    newGame(4);
  }
}

loadState();
</script>

</body>
</html>
